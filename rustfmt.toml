# Rustfmt configuration (aligned with Pelorus canonical: platform/dbc-rs/rustfmt.toml).
edition = "2024"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
chain_width = 80
single_line_if_else_max_width = 50
use_field_init_shorthand = true
use_try_shorthand = true
