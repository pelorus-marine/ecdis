# Example Weston `[launcher]` fragment (merge into weston.ini).
#
# `ecdis-ui` requires an ENC path argument. Weston launchers do not pass argv reliably —
# prefer the systemd unit in `ecdis-ui.service`, or install a small wrapper script and point
# `path=` at that script.

# [launcher]
# path=/usr/local/bin/ecdis-ui-weston.sh
